---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: flux-system
spec:
  chart:
    spec:
      chart: ollama
      # Pinned temporarily — chart 1.56.0 is broken (HelmRelease stalled).
      # Remove to resume auto-updates once upstream ships a working version.
      version: "1.55.0"
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: ollama-helm
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  interval: 1m0s
  targetNamespace: ai

  values:
    ollama:
      gpu:
        enabled: true
        type: 'nvidia'
        number: 1

      models:
        pull:
          - mistral
          - llama2

        run:
          - mistral

    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "4"
        memory: "8Gi"
    persistentVolume:
      enabled: true
      existingClaim: "pvc-ollama-data"

    ingress:
      enabled: false
