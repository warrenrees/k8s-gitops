# Imported into GitOps during the namespace migration — the volume was
# originally created directly in Longhorn. Statically bound to the existing
# PV (and its data) via volumeName.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-immich-db
  namespace: media
spec:
  storageClassName: longhorn
  volumeName: immich-db
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
