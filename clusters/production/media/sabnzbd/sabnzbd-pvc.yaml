# Imported into GitOps during the namespace migration — the volume was
# originally created directly in Longhorn. Statically bound to the existing
# PV (and its data) via volumeName.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-sabnzbd-config
  namespace: media
spec:
  storageClassName: longhorn-static
  volumeName: sabnzbd-config
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
