apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwakeword
  namespace: media
spec:
  selector:
    matchLabels:
      app: openwakeword
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openwakeword
    spec:
      containers:
      - env:
        - name: TZ
          value: America\Toronto
        imagePullPolicy: IfNotPresent
        name: openwakeword-k8s
        image: rhasspy/wyoming-openwakeword:2.1.0 # {"$imagepolicy": "flux-system:openwakeword"}
        #args:
        #- --preload-model 'ok_nabu'
        ports:
        - containerPort: 10400
          protocol: TCP
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
      hostname: openwakeword
---
apiVersion: v1
kind: Service
metadata:
  name: openwakeword
  namespace: media
  labels:
    app: openwakeword
  annotations:
    lbipam.cilium.io/sharing-key: wyoming-svc
spec:
  ports:
  - name: openwakeword-10400
    port: 10400
    protocol: TCP
    targetPort: 10400
  selector:
    app: openwakeword
  externalTrafficPolicy: Cluster
  type: LoadBalancer
  loadBalancerIP: 10.0.0.247
