apiVersion: v1
kind: Namespace
metadata:
  name: ai
  labels:
    managed-by: flux
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    managed-by: flux
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
  labels:
    managed-by: flux
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest

---
apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    managed-by: flux
    # Longhorn instance-managers run privileged with hostPath mounts.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: Namespace
metadata:
  name: node-feature-discovery
  labels:
    managed-by: flux
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    managed-by: flux
    # node-exporter uses hostNetwork/hostPID/hostPath, forbidden by baseline.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: Namespace
metadata:
  name: identity
  labels:
    managed-by: flux
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
