# Imported into GitOps during the namespace migration — the volume was
# originally created directly in Longhorn. Statically bound to the existing
# PV (and its data) via volumeName.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-minecraft-bodhi
  namespace: games
spec:
  storageClassName: longhorn
  volumeName: minecraft-bodhi
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
