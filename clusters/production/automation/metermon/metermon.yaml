# Imported into GitOps during the namespace migration — metermon was
# previously a manually-applied (non-GitOps) workload in the default namespace.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metermon
  namespace: automation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metermon
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: metermon
    spec:
      hostNetwork: true
      hostname: metermon
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: metermon
        # Upstream publishes only the `latest` tag (no semver), so pin by
        # digest for reproducibility. Bump manually when an update is wanted.
        image: seanauff/metermon:latest@sha256:01264bae174f5f030ec1add9b6bdb86eb7879d03ccc38a940cbb6d7a337c55ca
        imagePullPolicy: IfNotPresent
        env:
        - name: MQTT_BROKER_HOST
          value: "10.0.0.245"
        - name: RTL_TCP_SERVER
          value: "10.0.0.15:1234"
        - name: RTLAMR_UNIQUE
          value: "false"
        - name: METERMON_SEND_BY_ID
          value: "true"
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"
