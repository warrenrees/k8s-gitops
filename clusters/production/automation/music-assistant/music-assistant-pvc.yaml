# Imported into GitOps during the namespace migration — the volume was
# originally created directly in Longhorn. Statically bound to the existing
# PV (and its data) via volumeName.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-music-assistant-data
  namespace: automation
spec:
  storageClassName: longhorn
  volumeName: music-assistant-data
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
