# Imported into GitOps during the namespace migration — the volume was
# originally created directly in Longhorn. Statically bound to the existing
# PV (and its data) via volumeName.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-oscar-data
  namespace: oscar
spec:
  storageClassName: longhorn
  volumeName: oscar-data
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
