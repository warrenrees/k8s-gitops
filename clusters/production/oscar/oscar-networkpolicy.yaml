apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ingress-baseline
  namespace: oscar
spec:
  description: >-
    Default-deny ingress for the namespace. Allows the Cilium gateway,
    same-namespace traffic, cluster nodes (kubelet probes / host-network
    clients) and Prometheus scraping. Egress is intentionally unrestricted.
  endpointSelector: {}
  ingress:
    # The Cilium Gateway API ingress proxy, plus cluster nodes for kubelet
    # health probes, `kubectl exec/port-forward`, and host-network clients.
    - fromEntities:
        - ingress
        - host
        - remote-node
        - kube-apiserver
        - health
    # Any pod in this same namespace.
    - fromEndpoints:
        - {}
    # Prometheus metric scraping.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
