---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  interval: 1m0s
  targetNamespace: monitoring

  values:
    defaultRules:
      disabled:
        etcdHighNumberOfFailedGRPCRequests: true

    alertmanager:
      config:
        global:
          resolve_timeout: 5m
      alertmanagerSpec:
        useExistingSecret: true

    grafana:
      persistence:
        enabled: true
        type: pvc
        storageClassName: longhorn
        accessModes: ["ReadWriteOnce"]
        size: 2Gi
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

    prometheus:
      prometheusSpec:
        secrets: ["etcd-client-cert"]
        # Retention sized for the 10Gi volume below (~0.85 GB/day measured ingest).
        retention: 7d
        retentionSize: "8GiB"
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
        resources:
          requests:
            cpu: "200m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"

    kubeEtcd:
      service:
        port: 2379
        targetPort: 2379
      serviceMonitor:
        scheme: https
        insecureSkipVerify: true
        caFile: /etc/prometheus/secrets/etcd-client-cert/ca.crt
        certFile: /etc/prometheus/secrets/etcd-client-cert/apiserver-etcd-client.crt
        keyFile: /etc/prometheus/secrets/etcd-client-cert/apiserver-etcd-client.key
