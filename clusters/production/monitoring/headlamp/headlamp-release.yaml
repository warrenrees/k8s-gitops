---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: flux-system
spec:
  chart:
    spec:
      chart: headlamp
      sourceRef:
        kind: HelmRepository
        name: headlamp
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  interval: 30m0s
  releaseName: headlamp
  targetNamespace: monitoring
  values:
    serviceAccount:
      create: false
      name: warren
    persistentVolumeClaim:
      enabled: false
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    service:
      type: ClusterIP
      port: 80
    ingress:
      enabled: false
    config:
      extraArgs:
      - "-log-level=debug"
      oidc:
        callbackURL: "https://headlamp.rees.ca/oidc-callback"
        externalSecret:
          enabled: true
          name: headlamp-oidc
        secret:
          create: false
