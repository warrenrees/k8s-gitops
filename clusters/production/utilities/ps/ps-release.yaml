apiVersion: apps/v1
kind: Deployment
metadata:
  name: ps
  namespace: utilities
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ps
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ps
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: ps
        securityContext:
          allowPrivilegeEscalation: false
        image: warrenrees/property-search:latest
        imagePullPolicy: IfNotPresent
        #ports:
        #- containerPort: 8000
        startupProbe:
          tcpSocket:
            port: 8000
          failureThreshold: 60
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 8000
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 8000
          periodSeconds: 10
        env:
        - name: TZ
          value: America\Toronto
        # Trust X-Forwarded-For/X-Real-IP from the in-cluster proxy chain so the
        # real client IP is logged instead of the cluster/proxy IP. uvicorn has
        # proxy headers enabled by default; this widens the trusted-peer list.
        - name: FORWARDED_ALLOW_IPS
          value: "*"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        volumeMounts:
        # The database lives on the PVC (not in the image); the app reads it
        # from /data/properties.db (DB_PATH default in the image).
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: pvc-ps
      imagePullSecrets:
      - name: dockerhub-secret
---
apiVersion: v1
kind: Service
metadata:
  name: ps
  namespace: utilities
  labels:
    app: ps
spec:
  selector:
    app: ps
  ports:
  - name: ps
    port: 8000
    targetPort: 8000
  type: ClusterIP
