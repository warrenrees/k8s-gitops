---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-crds
  namespace: flux-system
spec:
  interval: 1h0m0s
  prune: true
  retryInterval: 2m0s
  sourceRef:
    kind: GitRepository
    name: gateway-api
  path: ./config/crd/standard
  wait: true
  timeout: 5m0s
