---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: exuone-dev-tls
  namespace: gateway
spec:
  secretName: exuone-dev-tls
  issuerRef:
    name: letsencrypt-prod-dns
    kind: ClusterIssuer
  dnsNames:
  - devapi.automatedassessment.com
  - devapi.exuone.com
  - devportal.automatedassessment.com
  - devportal.exuone.com
